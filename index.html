<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1,minimum-scale=1">
<title>不败神</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js">
</script>
<style>
/* 全局变量统一管理，弹窗颜色完全适配主题 */
:root{
    --bg:#ffb6c1;
    --glass:rgba(255, 182, 193, 0.9);
    --glass-card:rgba(255,255,255,0.25);
    --primary:#ff0040;
    --text-white:#ffffff;
    --text-dark:#222222;
    --ani-duration: 0.3s;
    --ani-cubic: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ani-ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
[data-theme="dark"]{
    --bg:#1a1a1a;
    --glass:rgba(0,0,0,0.75);
    --glass-card:rgba(0,0,0,0.35);
    --primary:#ff0040;
    --text-white:#ffffff;
    --text-dark:#ffffff;
    --ani-duration: 0.3s;
    --ani-cubic: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ani-ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    -webkit-tap-highlight-color: transparent;
    transition: background var(--ani-duration) var(--ani-ease),
                border-color var(--ani-duration) var(--ani-ease),
                color var(--ani-duration) var(--ani-ease),
                box-shadow var(--ani-duration) var(--ani-ease);
}
html,body{height:100vh;overflow:hidden;}
body{background:var(--bg);transition:.3s;}
.snow{
    position:fixed;
    color:#fff;
    font-size:12px;
    animation:fall 4s linear infinite;
    z-index: 999;
    pointer-events:none;
    will-change: transform, opacity;
}
@keyframes fall{
    0%{transform: translateY(-10px);opacity:0}
    10%{opacity:1}
    100%{transform: translateY(100vh);opacity:0}
}
.glass{
    background: var(--glass) !important;
    -webkit-backdrop-filter:blur(40px) saturate(200%) !important;
    backdrop-filter:blur(40px) saturate(200%) !important;
    border:1px solid rgba(255,255,255,0.35) !important;
    box-shadow:0 12px 40px rgba(255, 0, 64, 0.15) !important;
    will-change: backdrop-filter, transform;
}
.glass-card{
    background: var(--glass-card) !important;
    -webkit-backdrop-filter:blur(40px) saturate(200%) !important;
    backdrop-filter:blur(40px) saturate(200%) !important;
    border:1px solid rgba(255,255,255,0.18) !important;
    box-shadow:0 12px 40px rgba(0,0,0,0.06) !important;
    will-change: backdrop-filter, transform;
}
[data-theme="dark"] .glass{
    border-color: rgba(255,255,255,0.12) !important;
    box-shadow:0 12px 40px rgba(0,0,0,0.3) !important;
}
[data-theme="dark"] .glass-card{
    border-color: rgba(255,255,255,0.08) !important;
}
.page{
    position:fixed;
    inset: 0;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10;
    transition: all 0.5s var(--ani-cubic);
    will-change: transform, opacity;
}
.hide{
    opacity:0;
    transform: scale(0.92) translateY(20px);
    pointer-events:none!important;
    z-index: 0!important;
    transition: all 0.4s var(--ani-ease);
}
.load-box{padding:40px 60px;border-radius:24px;text-align:center;transition: transform 0.3s var(--ani-cubic), box-shadow 0.3s var(--ani-ease);}
.load-box:hover{transform: translateY(-5px);box-shadow:0 15px 50px rgba(0,0,0,0.12) !important;}
.load-title{
    font-size:60px;
    color:var(--text-white);
    font-weight:900;
    font-family: "Arial Black", sans-serif;
    animation:bounce 1.2s infinite
}
@keyframes bounce{50%{transform:scale(1.15)}}
.load-bar{width:220px;height:7px;background:rgba(255,255,255,.2);border-radius:99px;margin-top:30px;overflow:hidden}
.load-progress{width:0;height:100%;background:var(--primary);animation:load 1s forwards}
@keyframes load{100%{width:100%}}
.main-card{
    width:90%;max-width:360px;padding:40px 25px;border-radius:28px;text-align:center;
    transform:translateY(30px);opacity:0;animation:cardIn 1s .3s forwards;
    transition: transform 0.3s var(--ani-cubic), box-shadow 0.3s var(--ani-ease);
    will-change: transform, box-shadow;
}
.main-card:hover{transform: translateY(-5px);box-shadow:0 15px 50px rgba(0,0,0,0.12) !important;}
@keyframes cardIn{100%{transform:translateY(0);opacity:1}}
.logo-text{color:var(--text-white);font-size:28px;font-weight:700;font-family: "Arial Black", sans-serif;margin-bottom:15px}
.avatar-box{
    width:100px;height:100px;border-radius:50%;background:var(--primary);margin:0 auto 20px;
    display:flex;align-items:center;justify-content:center;color:var(--text-white);font-size:40px;font-weight:bold;border:3px solid var(--text-white);
    transition: transform 0.3s var(--ani-cubic), box-shadow 0.3s var(--ani-ease);
    will-change: transform;
}
.avatar-box:hover{transform: scale(1.1) rotate(5deg);box-shadow: 0 0 20px rgba(255, 0, 64, 0.5);}
.tips-green{color:#39ff14;font-size:18px;margin-bottom:15px;font-weight:600}
.tips-text{color:var(--text-white);font-size:20px;line-height:1.8;margin-bottom:15px;font-family: "KaiTi", serif;}
.tips-tag{color:#39ff14;font-size:17px;margin-bottom:25px;font-weight:600}
.free-tag{color:var(--text-white);font-size:28px;font-weight:700;font-family: "Arial Black", sans-serif;margin-bottom:30px}
.func-input, .func-textarea, .kami-input, .auth-input, .edit-input{
    width:100%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:14px;color:var(--text-white);outline:none;font-size:16px;
    transition: all 0.3s var(--ani-ease);
    will-change: border-color, box-shadow, background;
}
.func-input{height:48px;padding:0 15px;margin-bottom:12px;}
.func-textarea{height:120px;padding:15px;resize:none;margin-bottom:12px;}
.func-input::placeholder, .func-textarea::placeholder, .kami-input::placeholder, .auth-input::placeholder, .edit-input::placeholder{color:rgba(255,255,255,.7);}
.func-input:focus, .func-textarea:focus, .kami-input:focus, .auth-input:focus, .edit-input:focus{
    border-color: var(--primary);
    background: rgba(255,255,255,.2);
    box-shadow: 0 0 0 3px rgba(255, 0, 64, 0.15);
}
.func-result{
    padding:15px;background:rgba(0,0,0,.2);border-radius:14px;color:var(--text-white);margin-top:10px;text-align:left;min-height:60px;line-height:1.6;
    transition: opacity 0.3s var(--ani-ease), transform 0.3s var(--ani-cubic);
    opacity: 0.9;
    will-change: opacity, transform;
}
.func-result:focus-within{opacity: 1;transform: translateY(-2px);}
.func-img{
    width:100%;height:180px;object-fit:contain;border-radius:14px;background:rgba(0,0,0,.2);margin-bottom:12px;display:none;
    transition: opacity 0.3s var(--ani-ease), transform 0.3s var(--ani-cubic);
    will-change: opacity, transform;
}
.func-img[src]{display:block;opacity: 1;transform: translateY(-2px);}
canvas{border-radius:14px;}
@keyframes btnBounceSmooth {
    0% { opacity: 0; transform: scale(0.2); }
    50% { opacity: 1; transform: scale(1.2); }
    70% { transform: scale(0.9); }
    100% { opacity: 1; transform: scale(1); }
}
.main-btn{
    width:100%;height:52px;border-radius:16px;background:var(--primary);color:var(--text-white);border:none;
    font-size:17px;font-weight:700;margin:8px 0;
    opacity:0;
    animation: btnBounceSmooth 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
    cursor: pointer;
    transition: all 0.25s var(--ani-cubic);
    will-change: transform, box-shadow;
}
.main-btn:nth-child(1){animation-delay:0.4s}
.main-btn:nth-child(2){animation-delay:0.6s}
.main-btn:nth-child(3){animation-delay:0.8s}
.main-btn:nth-child(4){animation-delay:1.0s}
.main-btn:hover{transform: translateY(-2px) scale(1.02);box-shadow: 0 8px 20px rgba(255, 0, 64, 0.4);}
.main-btn:active{transform: translateY(0) scale(0.98);}
.btn{
    width:100%;height:50px;border-radius:14px;font-size:16px;font-weight:700;border:none;margin-bottom:10px;
    cursor: pointer;
    transition: all 0.25s var(--ani-cubic);
    will-change: transform, background;
}
.btn:hover{transform: translateY(-2px);box-shadow: 0 6px 16px rgba(0,0,0,0.1);}
.btn:active{transform: translateY(0);}
.btn-verify{background:var(--primary);color:var(--text-white)}
.btn-verify:hover{box-shadow: 0 8px 20px rgba(255,0,64,.35);}
.btn-buy{background:rgba(255,0,64,.2);color:var(--primary);border:1px solid var(--primary)}
.btn-buy:hover{background: rgba(255,0,64,.3);}
.kami-box{width:90%;max-width:380px;padding:45px 30px;border-radius:28px;text-align:center;transition: transform 0.3s var(--ani-cubic), box-shadow 0.3s var(--ani-ease);}
.kami-box:hover{transform: translateY(-5px);box-shadow:0 15px 50px rgba(0,0,0,0.12) !important;}
.kami-title{font-size:45px;color:var(--text-white);font-weight:70;margin-bottom:30px}
.kami-input{height:50px;padding:0 18px;margin-bottom:16px;}
.success-box{padding:45px 55px;border-radius:24px;text-align:center;transition: transform 0.3s var(--ani-cubic), box-shadow 0.3s var(--ani-ease);}
.success-box:hover{transform: translateY(-5px);box-shadow:0 15px 50px rgba(0,0,0,0.12) !important;}
.success-title{font-size:45px;color:var(--text-white);margin-bottom:20px}
.success-desc{font-size:18px;color:rgba(255,255,255,.85);margin-bottom:30px}
.btn-enter{background:var(--primary);color:var(--text-white);padding:12px 35px;border-radius:14px;border:none;cursor: pointer;transition: all 0.25s var(--ani-cubic);font-weight:700;}
.btn-enter:hover{transform: scale(1.05);box-shadow: 0 6px 16px rgba(255, 0, 64, 0.3);}
.profile-box{width:90%;max-width:380px;padding:30px 20px;border-radius:28px;text-align:center;transition: transform 0.3s var(--ani-cubic), box-shadow 0.3s var(--ani-ease);}
.profile-box:hover{transform: translateY(-5px);box-shadow:0 15px 50px rgba(0,0,0,0.12) !important;}
.profile-avatar{
    width:80px;height:80px;border-radius:50%;background:var(--primary);color:var(--text-white);font-size:30px;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;
    transition: transform 0.3s var(--ani-cubic), box-shadow 0.3s var(--ani-ease);
    will-change: transform;
}
.profile-avatar:hover{transform: scale(1.1) rotate(5deg);box-shadow: 0 0 20px rgba(255, 0, 64, 0.5);}
.profile-name{color:var(--text-white);font-size:22px;font-weight:70;margin-bottom:8px}
.profile-desc{color:rgba(255,255,255,.7);font-size:14px;margin-bottom:12px;line-height:1.4;padding:0 10px;}
.profile-id{color:rgba(255,255,255,.7);font-size:14px;margin-bottom:25px}
.profile-level{color:#39ff14;font-size:16px;margin-bottom:8px;font-weight:600}
.profile-exp{color:var(--text-white);font-size:14px;margin-bottom:18px;opacity:0.8}
.profile-btn{
    width:100%;height:45px;border-radius:12px;background:rgba(255,255,255,.1);color:var(--text-white);border:none;margin:8px 0;font-weight:600;
    cursor: pointer;
    transition: all 0.25s var(--ani-cubic);
}
.profile-btn:hover{background: rgba(255,255,255,.18);transform: translateY(-1px);}
.profile-btn:active{transform: translateY(0);}
.auth-box{width:90%;max-width:380px;padding:40px 30px;border-radius:28px;text-align:center;transition: transform 0.3s var(--ani-cubic), box-shadow 0.3s var(--ani-ease);}
.auth-box:hover{transform: translateY(-5px);box-shadow:0 15px 50px rgba(0,0,0,0.12) !important;}
.auth-title{font-size:40px;color:var(--text-white);margin-bottom:20px}
.auth-tab{display:flex;gap:8px;margin-bottom:20px}
.tab-btn{
    flex:1;height:40px;border-radius:10px;background:rgba(255,255,255,.1);color:var(--text-white);border:none;font-size:16px;font-weight:600;
    transition: all 0.3s var(--ani-cubic);
    cursor: pointer;
}
.tab-btn.active{background:var(--primary);transform: scale(1.05);}
.tab-btn:hover{background: rgba(255,255,255,.18);}
.auth-input{height:50px;padding:0 18px;margin-bottom:12px;}
.btn-auth{
    width:100%;height:50px;background:var(--primary);color:var(--text-white);border-radius:14px;border:none;font-size:16px;font-weight:700;margin-top:10px;
    cursor: pointer;
    transition: all 0.25s var(--ani-cubic);
}
.btn-auth:hover{transform: translateY(-2px);box-shadow: 0 8px 20px rgba(255, 0, 64, 0.35);}
.btn-back{background:rgba(255,255,255,.1);color:var(--text-white);margin-top:15px}
.modal{
    position:fixed;
    inset: 0;
    width:100%;height:100%;
    background:rgba(0,0,0,.5);
    display:flex;align-items:center;justify-content:center;
    z-index:9999;
    transition: opacity 0.3s var(--ani-ease);
    will-change: opacity;
}
.modal.hide{opacity: 0;transform: none;pointer-events: none;}
.modal-box{
    padding:35px 45px;border-radius:22px;text-align:center;min-width:280px;max-width:90%;
    transition: transform 0.4s var(--ani-cubic), opacity 0.4s var(--ani-ease);
    transform: scale(0.8) translateY(30px);
    opacity: 0;
    will-change: transform, opacity;
}
.modal:not(.hide) .modal-box{transform: scale(1) translateY(0);opacity: 1;}
.modal-text{font-size:17px;color:var(--text-white);margin-bottom:25px;line-height: 1.8;font-weight: 600;white-space: pre-line;}
.modal-btn{
    background:var(--primary);color:var(--text-white);padding:12px 35px;border-radius:12px;border:none;font-weight:700;font-size:16px;
    cursor: pointer;
    transition: all 0.25s var(--ani-cubic);
}
.modal-btn:hover{transform: scale(1.05);box-shadow: 0 4px 12px rgba(255, 0, 64, 0.3);}
.modal-btn:active{transform: scale(0.98);}
.toast{
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
    padding:12px 24px;border-radius:20px;color:var(--text-white);font-size:14px;font-weight:600;
    z-index:9999;opacity:0;transition:opacity .3s var(--ani-ease), transform .3s var(--ani-cubic);
    will-change: opacity, transform;
}
.toast.show{opacity:1;transform: translateX(-50%) translateY(0);}
.float-ball{
    position: fixed;
    top: 28px;
    right: 18px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #111111;
    border: 2px solid #ffffff;
    z-index:99999999;
    box-shadow:0 0 12px rgba(0,0,0,0.6);
    user-select: none;
    touch-action: none;
    display:block;
    transition: left 0.3s var(--ani-cubic), top 0.3s var(--ani-cubic), transform 0.25s var(--ani-cubic);
    will-change: left, top, transform;
    cursor: pointer;
}
.float-ball:hover{transform: scale(1.1);box-shadow:0 0 20px rgba(0,0,0,0.8);}
@keyframes shake{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.shake{animation:shake 0.28s ease}
.mood-modal{
    position:fixed;inset:0;width:100%;height:100%;background:rgba(0,0,0,0.5);
    z-index:9999999;display:none;align-items:center;justify-content:center;
    transition: opacity 0.4s var(--ani-ease);
    opacity: 0;
}
.mood-modal.show{opacity: 1;}
.mood-box{
    width:85%;max-width:350px;padding:30px;border-radius:20px;text-align:center;
    transform:translateY(100px);opacity:0;transition:all 0.4s var(--ani-cubic);
    will-change: transform, opacity;
}
.mood-modal.show .mood-box{transform:translateY(0);opacity:1}
.mood-text{font-size:18px;color:var(--text-white);line-height:1.6;font-weight:600;}
#editModal .modal-box{width:85%;max-width:350px;}
#editModal h3{color:var(--text-white);margin-bottom:20px;font-size:22px;}
.edit-input{height:50px;padding:0 18px;margin-bottom:12px;}
.setting-modal{
    position:fixed;inset:0;width:100%;height:100%;background:rgba(0,0,0,0.5);
    z-index:999999;display:none;align-items:center;justify-content:center;padding:20px;
    transition: opacity 0.4s var(--ani-ease);
    opacity: 0;
}
.setting-modal.show{opacity: 1;}
.setting-box{
    width:100%;max-width:380px;border-radius:24px;padding:25px;max-height:80vh;overflow-y:auto;
    transform:translateY(80px);opacity:0;transition:all 0.4s var(--ani-cubic);
    will-change: transform, opacity;
}
.setting-modal.show .setting-box{transform:translateY(0);opacity:1}
.setting-title{font-size:24px;color:var(--text-white);font-weight:bold;text-align:center;margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid rgba(255,255,255,0.2);}
.setting-item{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 10px;border-radius:12px;margin-bottom:8px;color:var(--text-white);font-size:16px;font-weight:500;
    transition: background 0.25s var(--ani-ease);
    cursor: pointer;
}
.setting-item:hover{background: rgba(255,255,255,0.1);}
.setting-switch{
    width:42px;height:22px;border-radius:20px;background:#ccc;position:relative;
    transition: background 0.3s var(--ani-ease);
    cursor: pointer;
}
.setting-switch.active{background:var(--primary);}
.setting-switch::after{
    content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;
    transition: all 0.3s var(--ani-cubic);
    will-change: left;
}
.setting-switch.active::after{left:22px}
.setting-btn{
    width:100%;padding:12px;border-radius:12px;background:var(--primary);color:var(--text-white);border:none;font-size:16px;font-weight:700;margin-top:15px;
    cursor: pointer;
    transition: all 0.25s var(--ani-cubic);
}
.setting-btn:hover{transform: translateY(-2px);box-shadow: 0 6px 16px rgba(255, 0, 64, 0.3);}
.setting-close{margin-top:10px;background:rgba(255,255,255,.1);color:var(--text-white);}
#fireworks{
    position:fixed;
    inset:0;
    width:100%;height:100%;
    pointer-events:none;
    z-index:999999999;
}
@keyframes rotateMusic {
    0%{transform: rotate(0deg);}
    100%{transform: rotate(360deg);}
}
.music-wrap{
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 9998;
    transition: transform .3s var(--ani-ease);
    will-change: transform;
}
.music-wrap.hide{transform: translateX(calc(-100% - 20px));}
.music-circle{
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--primary);
    display: flex;
    align-items:center;
    justify-content:center;
    color: var(--text-white);
    font-size: 26px;
    cursor: pointer;
    transition: all 0.3s var(--ani-cubic);
    will-change: transform;
}
.music-circle:hover{transform: scale(1.1);box-shadow: 0 4px 15px rgba(255, 0, 64, 0.4);}
.music-circle.rotate{animation: rotateMusic 3s linear infinite;}
.music-bar{
    height: 52px;
    width: 240px;
    padding: 0 22px;
    background: var(--text-white);
    border-radius: 26px;
    display: flex;
    align-items: center;
    gap: 28px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    transition: all 0.4s var(--ani-cubic);
    overflow: hidden;
    opacity: 1;
    transform: translateX(0);
    flex-shrink: 0;
    will-change: width, opacity, transform, padding;
}
.music-bar.bar-hide{
    opacity: 0;
    width: 0;
    padding: 0;
    transform: translateX(-20px);
    margin: 0;
}
.play-btn{
    width: 20px;
    height: 20px;
    border: none;
    background: transparent;
    padding: 0;
    cursor: pointer;
    border-style: solid;
    border-width: 10px 0 10px 18px;
    border-color: transparent transparent transparent var(--primary);
    flex-shrink: 0;
    transition: all 0.3s var(--ani-ease);
}
.play-btn.pause{
    border: none;
    width: 18px;
    height: 18px;
    background: linear-gradient(90deg, var(--primary) 40%, transparent 40%, transparent 60%, var(--primary) 60%);
}
.play-btn:hover{transform: scale(1.15);}
.music-title{
    font-size: 17px;
    color: #333;
    white-space: nowrap;
    flex-shrink: 0;
    font-weight: 600;
}

/* ========== 新版悬浮窗样式 ========== */
.test-float{
    position: fixed;
    width: 340px;
    min-height: 420px;
    background: #0d0d0d;
    border-radius: 18px;
    z-index: 99999999;
    border: 2px solid var(--primary);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: none;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(255, 0, 64, 0.35), 0 8px 32px rgba(0,0,0,0.6);
    transition: transform 0.45s var(--ani-cubic), opacity 0.4s var(--ani-ease), left 0.35s var(--ani-cubic), top 0.35s var(--ani-cubic);
    will-change: transform, opacity, left, top;
    transform-origin: center center;
}

const bgm = $("bgm");

let isMusicPlaying = false;
let musicFileLoaded = false; // 是否已通过文件选择器加载过音乐

if(bgm) {
    bgm.volume = 0.8;

    // 先尝试设置相对路径（HTTP服务器下可能成功）
    bgm.src = "罗生门.mp3";
    
    // 监听错误：如果同目录加载失败，不做提示，等用户点击播放时再引导选择文件
    bgm.addEventListener('error', function(e) {
        // 如果尚未通过文件选择器加载，且当前src就是“罗生门.mp3”，则标记为未加载
        if (!musicFileLoaded && bgm.src.includes("罗生门.mp3")) {
            // 不自动弹出toast，等用户主动点击播放时处理
            console.log("本地文件自动加载失败，可手动选择文件播放。");
        }
    });
    
    bgm.addEventListener('play', ()=>{
        isMusicPlaying = true;
        musicPlay.classList.add('pause');
        musicCircle.classList.add('rotate');
    });
    bgm.addEventListener('pause', ()=>{
        isMusicPlaying = false;
        musicPlay.classList.remove('pause');

    });

        isMusicPlaying = false;
        musicPlay.classList.remove('pause');
        musicCircle.classList.remove('rotate');
    });

function requestMusicFile() {
    return new Promise((resolve, reject) => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'audio/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                resolve({ url, fileName: file.name });
            } else {
                reject(new Error('未选择文件'));
            }
        };
        // 安卓上可能需要取消操作
        input.oncancel = () => reject(new Error('取消选择'));
        input.click();
    });
}

if(musicPlay) {
    musicPlay.onclick = async ()=>{
        if(!bgm) return;
        
        // 如果音乐已经加载并且正在播放，则暂停
        if (isMusicPlaying) {
            bgm.pause();
            return;
        }
        
        // 如果音乐已暂停（有src且已加载），继续播放
        if (bgm.src && bgm.src !== window.location.href && bgm.duration > 0 && !isMusicPlaying) {
            bgm.play().then(()=>{
                toast("🎵 正在播放：罗生门");
            }).catch(err => {
                toast("⚠️ 无法继续播放，请重新选择音乐文件");
                console.error(err);
            });
            return;
        }
        
        // 尝试直接播放当前src（如果是HTTP服务器可能有效）
        if (bgm.src && bgm.src.includes("罗生门.mp3") && !musicFileLoaded) {
            try {
                await bgm.play();
                toast("🎵 正在播放：罗生门");
                return;
            } catch (e) {
                // 播放失败，将弹出文件选择器
                console.log("自动播放失败，请求用户选择文件");
            }
        }
        
        // 弹出文件选择器
        try {
            toast("请选择《罗生门》MP3文件");
            const { url, fileName } = await requestMusicFile();
            // 释放旧的URL
            if (bgm.src && bgm.src.startsWith('blob:')) {
                URL.revokeObjectURL(bgm.src);
            }
            bgm.src = url;
            musicFileLoaded = true;
            await bgm.play();
            toast("🎵 正在播放：" + fileName);
        } catch (err) {
            if (err.message !== '取消选择') {
                toast("❌ 未选择文件或文件无效");
            }
            console.error(err);
        }
    }
}

function startCodeScroll(canvasEl, durationMs = 3000){
    const codeLines = generateCodeLines();const ctx2 = canvasEl.getContext('2d');
    const width = canvasEl.width;const height = canvasEl.height;const fontSize = 13;const lineHeight = 18;
    const visibleLines = Math.ceil(height / lineHeight) + 2;const totalLines = codeLines.length;const startTime = performance.now();
    ctx2.fillStyle = '#000';ctx2.fillRect(0, 0, width, height);
    let lastLineIdx = 0;let scrollOffset = 0;let scrollSpeed = 0;
    function render(timestamp){
        const elapsed = timestamp - startTime;
        if(elapsed >= durationMs){
            ctx2.fillStyle = '#000';ctx2.fillRect(0, 0, width, height);
            ctx2.fillStyle = '#39ff14';ctx2.font = 'bold 16px monospace';ctx2.textAlign = 'center';
            ctx2.fillText('✅ 验证完成 - 加载功能面板', width/2, height/2);ctx2.textAlign = 'start';return;
        }
        const accelPhase = Math.min(elapsed / 500, 1);scrollSpeed = 0.8 + accelPhase * 5.5;
        scrollOffset += scrollSpeed * 16;
        if(scrollOffset >= lineHeight){ const linesScrolled = Math.floor(scrollOffset / lineHeight); scrollOffset -= linesScrolled * lineHeight; lastLineIdx = (lastLineIdx + linesScrolled) % totalLines; }
        ctx2.fillStyle = '#000';ctx2.fillRect(0, 0, width, height);
        ctx2.font = `bold ${fontSize}px "Courier New", monospace`;ctx2.textAlign = 'start';
        for(let i = 0; i < visibleLines; i++){
            const lineIdx = (lastLineIdx + i) % totalLines;const y = i * lineHeight - scrollOffset + 2;
            if(y < -lineHeight || y > height + lineHeight) continue;
            const alpha = 0.4 + (i / visibleLines) * 0.6;
            if(i < 2){ ctx2.fillStyle = `rgba(57, 255, 20, ${Math.min(1, alpha + 0.3)})`; }
            else if(i < 5){ ctx2.fillStyle = `rgba(180, 255, 180, ${alpha})`; }
            else { ctx2.fillStyle = `rgba(120, 200, 120, ${Math.max(0.15, alpha - 0.15)})`; }
            ctx2.fillText(codeLines[lineIdx], 8, y + fontSize);
        }
        codeScrollAnimId = requestAnimationFrame(render);
    }
    codeScrollAnimId = requestAnimationFrame(render);
}

    if(!testFloat || !header || !mini) return;
    let tDrag = false, tStartX, tStartY, tInitLeft, tInitTop;let dragTarget = null;
    header.addEventListener("mousedown",(e)=>{ if(floatPhase === 'idle') return; tDrag = true;dragTarget = 'float';testFloat.style.transition = 'none';testFloat.style.transform = 'none';tStartX = e.clientX;tStartY = e.clientY;tInitLeft = parseFloat(testFloat.style.left) || (window.innerWidth/2 - 170);tInitTop = parseFloat(testFloat.style.top) || (window.innerHeight/2 - 210);e.preventDefault(); });
    header.addEventListener("touchstart",(e)=>{ if(floatPhase === 'idle') return; tDrag = true;dragTarget = 'float';testFloat.style.transition = 'none';testFloat.style.transform = 'none';const t = e.touches[0];tStartX = t.clientX;tStartY = t.clientY;tInitLeft = parseFloat(testFloat.style.left) || (window.innerWidth/2 - 170);tInitTop = parseFloat(testFloat.style.top) || (window.innerHeight/2 - 210); }, {passive: false});
    mini.addEventListener("mousedown",(e)=>{ tDrag = true;dragTarget = 'mini';mini.style.transition = 'none';tStartX = e.clientX;tStartY = e.clientY;tInitLeft = parseFloat(mini.style.left) || 20;tInitTop = parseFloat(mini.style.top) || 20;e.preventDefault(); });
    mini.addEventListener("touchstart",(e)=>{ tDrag = true;dragTarget = 'mini';mini.style.transition = 'none';const t = e.touches[0];tStartX = t.clientX;tStartY = t.clientY;tInitLeft = parseFloat(mini.style.left) || 20;tInitTop = parseFloat(mini.style.top) || 20; }, {passive: false});
    document.addEventListener("mousemove",(e)=>{ if(!tDrag) return; let nx = tInitLeft + (e.clientX - tStartX);let ny = tInitTop + (e.clientY - tStartY); if(dragTarget === 'float'){ nx = Math.max(0, Math.min(nx, window.innerWidth - 340));ny = Math.max(0, Math.min(ny, window.innerHeight - 420));testFloat.style.left = nx + "px";testFloat.style.top = ny + "px";floatMiniPos = { left: nx + 140, top: ny + 180 }; } else if(dragTarget === 'mini'){ nx = Math.max(0, Math.min(nx, window.innerWidth - 60));ny = Math.max(0, Math.min(ny, window.innerHeight - 60));mini.style.left = nx + "px";mini.style.top = ny + "px";floatMiniPos = { left: nx, top: ny }; } });
    document.addEventListener("touchmove",(e)=>{ if(!tDrag) return; const t = e.touches[0];let nx = tInitLeft + (t.clientX - tStartX);let ny = tInitTop + (t.clientY - tStartY); if(dragTarget === 'float'){ nx = Math.max(0, Math.min(nx, window.innerWidth - 340));ny = Math.max(0, Math.min(ny, window.innerHeight - 420));testFloat.style.left = nx + "px";testFloat.style.top = ny + "px";floatMiniPos = { left: nx + 140, top: ny + 180 }; } else if(dragTarget === 'mini'){ nx = Math.max(0, Math.min(nx, window.innerWidth - 60));ny = Math.max(0, Math.min(ny, window.innerHeight - 60));mini.style.left = nx + "px";mini.style.top = ny + "px";floatMiniPos = { left: nx, top: ny }; } }, {passive: false});
    document.addEventListener("mouseup",()=>{ if(tDrag && dragTarget === 'float' && testFloat){ testFloat.style.transition = '';clampFloatPosition(testFloat); } if(tDrag && dragTarget === 'mini' && mini){ mini.style.transition = ''; } tDrag = false;dragTarget = null; });
    document.addEventListener("touchend",()=>{ if(tDrag && dragTarget === 'float' && testFloat){ testFloat.style.transition = '';clampFloatPosition(testFloat); } if(tDrag && dragTarget === 'mini' && mini){ mini.style.transition = ''; } tDrag = false;dragTarget = null; });
    $("testFloatMin").onclick = ()=>{ minimizeFloat(); };
    $("testFloatClose").onclick = ()=>{ closeFloatWindow(); };
    mini.onclick = ()=>{ expandFromMini(); };
}

function minimizeFloat(){
    const testFloat = $("testFloat");const mini = $("testFloatMini");
    if(!testFloat || !mini) return;
    const floatLeft = parseFloat(testFloat.style.left) || (window.innerWidth/2 - 170);
    const floatTop = parseFloat(testFloat.style.top) || (window.innerHeight/2 - 210);
    floatMiniPos = { left: floatLeft + 140, top: floatTop + 180 };
    testFloat.classList.add('shrink-out');
    testFloat.addEventListener('animationend', function handler(){ testFloat.removeEventListener('animationend', handler);testFloat.classList.remove('shrink-out');testFloat.style.display = 'none';testFloat.style.transform = '';testFloat.style.opacity = ''; }, {once: true});
    mini.style.left = floatMiniPos.left + 'px';mini.style.top = floatMiniPos.top + 'px';mini.style.display = 'flex';
    mini.classList.add('pop-in');mini.addEventListener('animationend', function h(){ mini.removeEventListener('animationend', h);mini.classList.remove('pop-in'); }, {once: true});
    toast("悬浮窗已最小化");
}

function expandFromMini(){
    const testFloat = $("testFloat");const mini = $("testFloatMini");
    if(!testFloat || !mini) return;
    const miniLeft = parseFloat(mini.style.left) || floatMiniPos.left || 20;
    const miniTop = parseFloat(mini.style.top) || floatMiniPos.top || 20;
    floatMiniPos = { left: miniLeft, top: miniTop };
    mini.style.display = 'none';
    let targetLeft = miniLeft - 140;let targetTop = miniTop - 180;
    targetLeft = Math.max(0, Math.min(targetLeft, window.innerWidth - 340));
    targetTop = Math.max(0, Math.min(targetTop, window.innerHeight - 420));
    testFloat.style.left = targetLeft + 'px';testFloat.style.top = targetTop + 'px';
    testFloat.style.transform = 'scale(0.15)';testFloat.style.opacity = '0';testFloat.style.display = 'block';
    if(window._floatCompleted && floatPhase === 'panel'){
        const securityPhase = $("securityPhase");const codeCanvas = $("codeScrollCanvas");const funcPanel = $("funcPanel");const titleEl = $("testFloatTitle");
        if(securityPhase) securityPhase.style.display = 'none';if(codeCanvas) codeCanvas.style.display = 'none';
        if(funcPanel) funcPanel.style.display = 'flex';if(titleEl) titleEl.textContent = '功能面板';floatPhase = 'panel';
    } else if(floatPhase === 'idle'){ resetFloatContent(); }
    requestAnimationFrame(()=>{
        testFloat.classList.add('expand-in');testFloat.style.transform = '';testFloat.style.opacity = '';
        testFloat.addEventListener('animationend', function handler(){ testFloat.removeEventListener('animationend', handler);testFloat.classList.remove('expand-in');testFloat.style.transform = '';testFloat.style.opacity = '';clampFloatPosition(testFloat); }, {once: true});
    });
    toast("悬浮窗已展开");
}

window.onload=()=>{
    document.querySelectorAll('button').forEach(btn=>{ btn.addEventListener('click',function(){ this.classList.add('shake');setTimeout(()=>this.classList.remove('shake'),28); }); });
    setTimeout(()=>{
        show("p2");autoLogin();
        let set;
        try { set = JSON.parse(localStorage.getItem("set")||'{"music":1,"snow":1,"firework":1,"theme":0}'); }
        catch(e) { set = {music:1, snow:1, firework:1, theme:0}; }
        if(!set.music){
            $("musicWrap").classList.add("hide");
            if(bgm && !bgm.paused) bgm.pause();
        }
        floatMiniPos = { left: window.innerWidth - 80, top: window.innerHeight - 200 };
    },1000);
}

window.addEventListener("resize",debounce(()=>{
    canvas.width=window.innerWidth;canvas.height=window.innerHeight;
    if(floatBall){ const ballWidth = floatBall.offsetWidth;const windowWidth = window.innerWidth;const currentLeft = parseFloat(floatBall.style.left);if(currentLeft + ballWidth > windowWidth){ floatBall.style.left = (windowWidth - ballWidth - 18) + "px"; } }
    const testFloat = $("testFloat");if(testFloat && testFloat.style.display === 'block'){ clampFloatPosition(testFloat); }
}));
</script>
